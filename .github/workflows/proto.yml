name: proto

# Contract changes fan out to every consumer, so the per-service workflows also
# trigger on proto/**. This workflow validates the contracts themselves.
on:
  push:
    branches: [main]
    paths:
      - 'proto/**'
      - '.github/workflows/proto.yml'
  pull_request:
    paths:
      - 'proto/**'
      - '.github/workflows/proto.yml'

concurrency:
  group: proto-${{ github.ref }}
  cancel-in-progress: true

jobs:
  buf:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0   # buf breaking needs history for the baseline

      - uses: bufbuild/buf-setup-action@v1
        with:
          github_token: ${{ github.token }}

      # Enforced: the contracts must compile.
      - name: buf build
        run: buf build proto

      # Enforced: STANDARD lint. The contracts now live in the canonical
      # ritchermap/<area>/v1/ layout, so the package/directory rules pass and
      # this is a hard gate against future drift.
      - name: buf lint
        run: buf lint proto

      # Advisory (transitional): wire-compatibility guardrail against main.
      # The one-time flat -> ritchermap/<area>/v1/ restructure registers as file
      # deletions under the FILE ruleset, so this stays advisory until the
      # canonical layout is the baseline on main — promote to a hard gate then.
      - name: buf breaking vs main (advisory)
        continue-on-error: true
        run: buf breaking proto --against ".git#branch=main,subdir=proto"
