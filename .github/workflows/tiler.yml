name: tiler

on:
  push:
    branches: [main]
    paths:
      - 'src/tiler/**'
      - 'proto/**'
      - '.github/workflows/tiler.yml'
  pull_request:
    paths:
      - 'src/tiler/**'
      - 'proto/**'
      - '.github/workflows/tiler.yml'

concurrency:
  group: tiler-${{ github.ref }}
  cancel-in-progress: true

defaults:
  run:
    working-directory: src/tiler

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: src/tiler/pyproject.toml

      # Enforced: the sources must at least compile.
      - name: Syntax check
        run: python -m compileall -q .

      # Advisory until the package layout is finalized (modules are currently
      # flat, but the `tiler.cli` entry point implies a `tiler/` package) and
      # real tests land. Installs deps and runs pytest if any tests exist.
      - name: Install & test
        continue-on-error: true
        run: |
          pip install -e '.[dev,s3,kafka]'
          if find . -name 'test_*.py' -o -name '*_test.py' | grep -q .; then
            pytest -q
          else
            echo "No test_*.py files yet; skipping pytest."
          fi

      - name: Lint (advisory)
        continue-on-error: true
        run: |
          pip install ruff
          ruff check .
