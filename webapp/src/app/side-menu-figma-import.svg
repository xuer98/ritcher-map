<svg xmlns="http://www.w3.org/2000/svg" width="706" height="1788" viewBox="0 0 706 1788">
  <title>Ritcher Map Side Menu - Figma import</title>
  <defs>
    <style>
      .bg{fill:#111214}
      .panel{fill:#2b2d31}
      .olive{fill:#343817}
      .text{fill:#d8d8da;font:600 27px Arial,Helvetica,sans-serif}
      .small{fill:#d8d8da;font:700 24px Arial,Helvetica,sans-serif;letter-spacing:3px}
      .muted{fill:#a9abad}
      .label{fill:#d2d2d4;font:700 26px Arial,Helvetica,sans-serif;letter-spacing:2px}
      .value{fill:#d8d8da;font:700 24px Arial,Helvetica,sans-serif}
      .accent{fill:#eefb3d}
      .accentText{fill:#eefb3d;font:800 24px Arial,Helvetica,sans-serif;letter-spacing:2px}
      .icon{fill:none;stroke:#f7f7f8;stroke-width:4;stroke-linecap:round;stroke-linejoin:round}
      .iconMuted{fill:none;stroke:#aeb0b2;stroke-width:4;stroke-linecap:round;stroke-linejoin:round}
      .glyph{fill:#c9cacc}
    </style>
  </defs>

  <rect class="bg" width="706" height="1788"/>
  <path d="M0 1718q0 52 46 70" fill="none" stroke="#34373c" stroke-width="2"/>
  <path d="M0 1727q0 43 38 61" fill="none" stroke="#4a4d53" stroke-width="2"/>

  <g id="logo" transform="translate(8 10) scale(.64)" fill="#f8f8f8">
    <path d="M22 26h15v17h13V26h15v17h13V26h15v31H39Q22 57 22 40z"/>
    <path d="M101 26h55q17 0 17 17v31h-16V57h-39V43h39q0-3-4-3h-52z"/>
    <path d="M181 43q0-17 18-17h52q18 0 18 17v31h-16V43q0-3-4-3h-11v34h-16V40h-16q-9 0-9 8v26h-16z"/>
    <path d="M278 26h60q16 0 16 16t-16 15h-44v17h-16zm16 14v5h40q4 0 4-3t-4-2z"/>
  </g>

  <g id="search">
    <circle cx="78" cy="174" r="48" class="panel"/>
    <path class="icon" d="M65 162h27v27H65zM76 162v27M92 162l7-4v35l-7-4"/>
    <rect x="142" y="126" width="534" height="96" rx="48" class="panel"/>
    <path class="iconMuted" d="M203 181l-13-13m6 6a14 14 0 1 0-20-20 14 14 0 0 0 20 20z"/>
    <text x="232" y="185" fill="#85878b" font-family="Arial,Helvetica,sans-serif" font-size="34" font-weight="700">Search</text>
  </g>

  <g id="discovery-progress">
    <rect x="30" y="239" width="646" height="111" rx="33" class="olive"/>
    <path class="icon" stroke="#eefb3d" d="M64 279h16l8 10-8 10H64l-8-10zM64 290l6 6 12-15"/>
    <path d="M62 301h21v9l-5-3-5 3-5-3-6 3z" fill="#eefb3d"/>
    <text x="117" y="286" class="accentText">DISCOVERY PROGRESS</text>
    <text x="117" y="319" fill="#d8d8da" font-family="Arial,Helvetica,sans-serif" font-size="24" font-weight="500">Please log in to track your progress</text>
    <text x="557" y="286" class="value">0 / 4891</text>
  </g>

  <g id="choose-map">
    <rect x="30" y="367" width="646" height="96" rx="30" class="panel"/>
    <path class="icon" stroke-width="3" d="M67 408l9-4 9 4 10-4v18l-10 4-9-4-9 4zM76 404v18M85 408v18"/>
    <text x="105" y="402" class="small">CHOOSE MAP</text>
    <text x="105" y="440" class="text">Lands Between</text>
    <path d="M625 412h11l-5.5 5.5z" fill="#f5f5f6"/>
  </g>

  <g id="toggles">
    <path class="icon" d="M88 505l33 29m-26-31q10-1 19 5 10 6 16 17m-42-10q4 12 14 18 10 7 22 4M84 513l9-9m31 31l9-9"/>
    <text x="50" y="567" class="label">HIDE ALL</text>
    <path class="icon" d="M563 501q13 0 13 13 0 6-5 12l-8 10-8-10q-5-6-5-12 0-13 13-13zM563 512v1M563 523v1"/>
    <text x="467" y="567" class="label">UNFOUND ONLY</text>
  </g>

  <g id="quick-links">
    <path class="iconMuted" d="M62 672a7 7 0 1 0 0-14 7 7 0 0 0 0 14zM50 689q2-11 12-11t12 11z"/>
    <text x="105" y="672" class="text">Your Timeline</text>
    <rect x="303" y="647" width="69" height="31" rx="8" fill="#585a5f"/>
    <text x="311" y="671" fill="#e1e1e3" font-family="Arial,Helvetica,sans-serif" font-size="21" font-weight="800">NEW</text>
    <text x="106" y="706" fill="#d8d8da" font-family="Arial,Helvetica,sans-serif" font-size="25" font-weight="600">0 sessions</text>
    <path class="iconMuted" d="M641 670l7 8-7 8"/>

    <path class="iconMuted" d="M48 775l5 5 7-9M48 790l5 5 7-9M66 776h11M66 790h11"/>
    <text x="105" y="792" class="text">100% Checklists</text>
    <rect x="353" y="767" width="69" height="31" rx="8" fill="#585a5f"/>
    <text x="361" y="791" fill="#e1e1e3" font-family="Arial,Helvetica,sans-serif" font-size="21" font-weight="800">NEW</text>
    <path class="iconMuted" d="M641 774l7 8-7 8"/>
    <line x1="30" y1="839" x2="676" y2="839" stroke="#26282b" stroke-width="2"/>
  </g>

  <g id="sections">
    <path class="icon" d="M61 885l7 8-7 8"/>
    <text x="97" y="901" class="label">MAP REGIONS</text>
    <path class="icon" d="M61 981l7 8-7 8"/>
    <text x="97" y="997" class="label">MY PINS</text>
    <rect x="625" y="973" width="31" height="31" rx="7" fill="#63c7e6" stroke="#aeeaff" stroke-width="2"/>
    <path class="icon" d="M632 988l7 8 13-16"/>
    <path class="icon" d="M61 1077l7 8-7 8"/>
    <text x="97" y="1093" class="label">EQUIPMENT</text>
    <rect x="625" y="1069" width="31" height="31" rx="7" fill="#58a9ed" stroke="#a8d6ff" stroke-width="2"/>
    <path class="icon" d="M632 1084l7 8 13-16"/>
    <path class="icon" d="M59 1177l7 8 8-8"/>
    <text x="97" y="1188" class="label">FOES</text>
    <rect x="625" y="1165" width="31" height="31" rx="7" fill="#8d2630" stroke="#d58b93" stroke-width="2"/>
    <path class="icon" d="M632 1180l7 8 13-16"/>
  </g>

  <g id="foe-grid" class="glyph">
    <path d="M65 1245l-5-6 2 13a12 12 0 0 0 23 0l2-13-6 6q-8-4-16 0zm4 10h3v3h-3zm10 0h3v3h-3z"/>
    <text x="106" y="1260" class="text">Boss</text>
    <text x="281" y="1260" class="value">143</text>
    <path d="M401 1240l-4-4-4 6a13 13 0 1 0 16 0l-4-6zm-8 18h16q-2 8-8 8t-8-8zm-2-8h6v4h-6zm14 0h6v4h-6z"/>
    <text x="432" y="1260" class="text">Elite Enemy</text>
    <text x="605" y="1260" class="value">129</text>

    <circle cx="74" cy="1332" r="13"/>
    <circle cx="69" cy="1330" r="3" fill="#111214"/>
    <circle cx="79" cy="1330" r="3" fill="#111214"/>
    <rect x="70" y="1338" width="8" height="5" rx="2" fill="#111214"/>
    <text x="106" y="1341" class="text">Enemy</text>
    <text x="293" y="1341" class="value">72</text>
    <circle cx="401" cy="1326" r="8"/>
    <path class="iconMuted" d="M388 1344l27-14M388 1330l27 14"/>
    <text x="432" y="1341" class="text">Great Boss</text>
    <text x="623" y="1341" class="value">13</text>

    <path d="M74 1398a13 13 0 0 0-13 13q0 12 13 17 13-5 13-17a13 13 0 0 0-13-13zm-6 11h4v4h-4zm10 0h4v4h-4z"/>
    <text x="106" y="1421" class="text">Invasion</text>
    <text x="295" y="1421" class="value">31</text>
    <path d="M387 1407l9 5 6-10 7 10 9-5v20q0 5-5 5h-21q-5 0-5-5z"/>
    <text x="432" y="1421" fill="#d8d8da" font-family="Arial,Helvetica,sans-serif" font-size="25" font-weight="600">Legendary Boss</text>
    <text x="633" y="1421" class="value">8</text>
    <rect x="625" y="1494" width="31" height="31" rx="7" fill="#315f98" stroke="#78a7e0" stroke-width="2"/>
  </g>
</svg>
